# Cloud provider switch: aws | azure | gcp. gcp renders standalone
# ComputeClass CRs (computeClasses below) instead of NodePool/NodeClass --
# GKE has no Karpenter-style split.
cloud: aws

infrastructure:
  # AWS (EC2NodeClass)
  securityGroupIds: []
  securityGroupTags: []
  securityGroupNames: []
  subnetIds: []
  subnetTags: []
  amiSelectorAlias:
  - bottlerocket@v1.25.0
  amiSelectorName: []
  amiSelectorIds: []
  role:
  instanceProfile:
  # Azure (AKSNodeClass) — used when cloud: azure
  imageFamily:
  vnetSubnetID:
  osDiskSizeGB:
  tags:

ec2NodeClass:
  default: 
    instanceProfile: 
    role: 
    subnetTags: []
    subnetIds: []
    securityGroupIds: []
    securityGroupNames: []
    securityGroupTags: []
    amiSelectorAlias: []
    amiSelectorIds: []
    amiSelectorNames: []
    rootVolume:
      deviceName: 
      type: 
      size: 
      deleteOnTermination: 
      encrypted: 
      kmsKeyID: 
      iops: 
      throughput: 
    extraVolumes: []
      # - deviceName: 
      #   type: 
      #   size: 
      #   deleteOnTermination: 
      #   encrypted: 
      #   kmsKeyID: 
      #   iops: 
      #   throughput: 
    tags: 
    detailedMonitoring: 
    associatePublicIPAddress: 
    metadataOptions:
      httpEndpoint: 
      httpProtocolIPv6: 
      httpTokens:
      httpPutResponseHopLimit:
    userData:

# Azure NAP node class (used when cloud: azure)
aksNodeClass:
  default:
    imageFamily:
    vnetSubnetID:
    osDiskSizeGB:
    tags:
    kubelet:

# GKE Compute Classes (used when cloud: gcp). Each key -> a standalone
# ComputeClass CR; see templates/computeclass.yaml.
computeClasses:
  default:
    nodePoolAutoCreation:
      enabled: true
    priorities:
      - machineFamily: n4
        minCores: 4
      # Hyperdisk-compatible fallback (e2 supports none).
      - machineFamily: c4
        minCores: 4
    whenUnsatisfiable: ScaleUpAnyway
  stable:
    nodePoolAutoCreation:
      enabled: true
    priorities:
      - machineFamily: n4
        minCores: 4
      # Hyperdisk-compatible fallback; also suits db workloads well.
      - machineFamily: c4
        minCores: 4
    whenUnsatisfiable: ScaleUpAnyway
    nodePoolConfig:
      taints:
        - effect: "NoSchedule"
          key: "compute-class"
          value: "stable"

nodePools:
  default:
    ec2NodeClass: default
    aksNodeClass: default
    disruption:
      consolidateAfter: 
      consolidationPolicy: 
      budgets:
    # limits omitted by default so Karpenter can provision as much as needed; set cpu and/or memory to cap
    limits:
      cpu: 
      memory: 
    weight: 
    nodeLabels:
    nodeAnnotations:
    taints:
    startupTaints:
    expireAfter:
    terminationGracePeriod: 
    instanceCategories: 
      operator: 
      values: []
    instanceFamily:
      operator: 
      values: []
    instanceCpu:
      operator: 
      values: []
    instanceHypervisor:
      operator: 
      values: []
    instanceGeneration:
      operator: 
      values: []
    instanceZone:
      operator: 
      values: []
    instanceArch:
      operator: 
      values: []
    capacityType:
      operator: 
      values: []
    instanceMemory:
      operator:
      values: []
    instanceType:
      operator:
      values: []
    windowsBuild:
      operator:
      values: []
    os:
      operator:
      values: []
    encryptionInTransit:
      operator:
      values: []
    size:
      operator:
      values: []
    cpuManufacturer:
      operator:
      values: []
    ebsBandwith:
      operator:
      values: []
    networkBandwith:
      operator:
      values: []
    pods:
      operator:
      values: []
    gpuName:
      operator:
      values: []
    gpuManufacturer:
      operator:
      values: []
    gpuCount:
      operator:
      values: []
    gpuMemory:
      operator:
      values: []
    localNvme:
      operator:
      values: []
    # Azure-only selectors (used when cloud: azure)
    instanceSize:
      operator:
      values: []
    storagePremium:
      operator:
      values: []