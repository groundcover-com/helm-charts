{{/*
Dedicated, non-rotating password for the read-only ClickHouse user
(`dictionary_reader`) that the schema-managed dictionaries authenticate with.
Kept separate from the rotating admin secret on purpose: dictionary SOURCE
clauses embed their credential in ClickHouse DDL, so it must stay stable
across admin password rotations. db-manager reads it via
GC_DICTIONARYUSER_PASSWORD and creates the user on boot.
The `lookup` in clickhouse.dictionaryUserPassword preserves the generated
value across upgrades; helm.sh/resource-policy keep survives uninstalls.
*/}}
{{ if and .Values.global.backend.enabled .Values.global.clickhouse.dictionaryUser.enabled (empty .Values.global.clickhouse.dictionaryUser.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clickhouse.dictionaryUserSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "groundcover.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: "keep"
type: Opaque
stringData:
  {{ template "clickhouse.dictionaryUserSecretKey" . }}: {{ include "clickhouse.dictionaryUserPassword" . | quote }}
{{ end }}
