{{- if ((.Values.vmclusters).dualShipping).enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vmclusters.dualShipping.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "groundcover.labels" . | nindent 4 }}
  annotations:
    # Created once and never regenerated: lookup preserves the original created-at on
    # upgrades, and resource-policy keep stops Helm from deleting it on uninstall.
    helm.sh/resource-policy: "keep"
type: Opaque
stringData:
  created-at: {{ include "vmclusters.dualShipping.createdAt" . | quote }}
{{- end }}
