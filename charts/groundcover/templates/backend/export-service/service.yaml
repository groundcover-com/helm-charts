{{ if and .Values.global.backend.enabled .Values.global.exportService.enabled }}
apiVersion: v1
kind: Service
metadata:
  annotations:
    {{- if .Values.exportService.additionalAnnotations }}
{{ toYaml .Values.exportService.additionalAnnotations | indent 4 }}
    {{- end }}
  labels:
    {{- include "groundcover.labels" . | nindent 4 }}
    app: export-service
    app.kubernetes.io/name: export-service
    {{- if .Values.exportService.additionalLabels }}
{{ toYaml .Values.exportService.additionalLabels | indent 4 }}
    {{- end }}
  name: {{ include "export-service.fullname" . }}
  namespace: {{ .Release.Namespace }}
spec:
  ports:
  - name: http
    port: 3001
    protocol: TCP
    targetPort: 3001
  selector:
    app: export-service
  type: ClusterIP
{{ end -}}
