{{ if or .Values.global.backend.enabled (.Values.portal.enabled | default false) }}
apiVersion: v1
data:
  config.yaml: |-

    LogLevel: 4

    Reverse: true
    startuptimeout: 1m0s
    MaxResponseSizeBytes: {{ .Values.portal.maxResponseSizeBytes }}

    ClusterId: {{ template "groundcover.clusterId" . }}
    MultipleClusterIds: 
    {{- with .Values.multipleClusterIds }}{{ toYaml . | nindent 6 }}{{- end }}  
    Features:
    {{- if .Values.portal.features }}
    {{ toYaml .Values.portal.features | nindent 6 }}
    {{- else }}
      []
    {{- end }}
    Autodiscovery: {{ or .Values.portal.autodiscovery (not (empty .Values.multipleClusterIds)) }}
    GroundcoverVersion: "OVERRIDEN"

    Incluster: true
    Namespace: {{ .Release.Namespace }}
    
    Router:
      Host: "{{ tpl .Values.saas.host . }}"
      Port: "{{ tpl (print .Values.saas.port) . }}"
      BasePath: "{{ .Values.saas.basePath }}"
      Token: "OVERRIDEN"
      WebsocketScheme: "{{ tpl .Values.saas.scheme . }}"
      TLSSkipVerify: "{{ tpl (print .Values.saas.tls_skip_verify) . }}"
      ExtraHeaders:
    {{- if .Values.installationId }}
        - Key: X-Portal-InstallationId
          Value: {{ .Values.installationId }}
    {{- end }}
    {{- if .Values.tags.incloud }}
        - Key: X-Portal-InCloud
          Value: "True"
    {{- end }}
    {{- with .Values.portal.extraHeaders }}
      {{ toYaml . | nindent 8 }}
    {{- end }}  

    DirectModeGRPCPort: "5555"

    VictoriaMetrics:
      {{- $m := .Values.global.metrics | default dict }}
      {{- $hasReadOverride := or (dig "overrideUrl" "" $m) (dig "read" "overrideHost" "" $m) }}
      {{- $az := dig "victoria-metrics-distributed" "availabilityZones" (list) (.Values.backend | default dict) }}
      {{- if and (not $hasReadOverride) ((.Values.vmclusters).dualShipping).enabled $az }}
      {{- /* No explicit read override + dual shipping: base read URL is the vmselect of the
             distributed-chart primary cluster (vmcluster-<availabilityZones[0].name>) rather than
             vmauth. An explicit global.metrics.read override still wins. */}}
      URL: {{ include "vmclusters.vmselectUrl" (printf "vmcluster-%s" (index $az 0).name) }}
      {{- else }}
      URL: {{ include "victoria-metrics.read.http.url" . }}
      {{- end }}
      {{- if ((.Values.vmclusters).dualShipping).enabled }}
      {{- $skipSlow := include "vmclusters.portalQuery.skipSlowCluster" . }}
      {{- if $skipSlow }}
      VMSelectSkipSlow: {{ include "vmclusters.vmselectUrl" $skipSlow }}
      {{- end }}
      {{- /* Feature gate the portal reads to decide whether to use VMSelectSkipSlow. Default false. */}}
      VMSelectSkipSlowEnabled: {{ dig "skipSlowEnabled" false ((.Values.vmclusters).portalQuery | default dict) }}
      {{- /* Seed the key so Viper registers it; the actual value is injected via
             the GC_VICTORIAMETRICS_DUALSHIPPINGSTART env var at runtime. */}}
      DualShippingStart: ""
      {{- end }}
      QueryUsageTracker:
        Enabled: {{ .Values.portal.queryUsageTracker.enabled }}

    ClickHouse:
      Pass: "OVERRIDEN"
      User: {{ include "clickhouse.username" . }}
      Host: {{ include "clickhouse.fullname" . }}
      Database: {{ include "clickhouse.database" . }}
      HTTPPort: {{ .Values.global.clickhouse.containerPorts.http | int }}
      NativePort: {{ .Values.global.clickhouse.containerPorts.tcp | int }}
    
    MonitorsManager:
      Enabled: false
      URL: "OVERRIDEN"
      Username: "admin"
      Password: "OVERRIDEN"

    Workflows:
      Enabled: false
      URL: "OVERRIDEN"
      APIKey: "OVERRIDEN"
    
    FleetManager:
      Enabled: {{ .Values.global.fleetmanager.enabled}}
      URL: {{ printf "http://%s:%d" (include "fleet-manager.fullname" .) (int .Values.fleetManager.manageHttpPort) }}

    BackendSettingsEnabled: {{ .Values.portal.backendSettings.enabled }}

    BackendSigningKey:
      Enabled: {{ .Values.portal.backendSigningKey.enabled }}

    {{- if eq (include "telemetry.enabled" .) "true" }}
    Tracing:
      Enabled: true
      Endpoint: '{{ include "telemetry.traces.otlpUrl" . }}'
      WriteTimeout: 5s
      FlushInterval: 5s
      BatchSize: 50
      Headers:
        apikey: "OVERRIDEN"
    {{- else }}
    Tracing:
      Enabled: false
      Endpoint: ""
    {{- end }}

    BackendName: "{{ .Values.global.backend.name }}"

    Pprof:
      enabled: {{ include "telemetry.enabled" . }}
      cpuSamplingDuration: {{ .Values.portal.pprof.cpuSamplingDuration }}
      httpUploader:
        enabled: {{ eq .Values.portal.pprof.uploaderType "http" }}
        pushURL: {{ printf "%s/upload/pprof" (include "telemetry.metrics.base.url" .) }}
      pyroscopeUploader:
        enabled: {{ eq .Values.portal.pprof.uploaderType "pyroscope" }}
        pushURL: {{ include "telemetry.metrics.base.url" . }}
      backoffTicker:
        interval: {{ .Values.portal.pprof.backoffTicker.interval }}
        exponent: {{ .Values.portal.pprof.backoffTicker.exponent }}
      memoryTicker:
        enabled: {{ .Values.portal.pprof.memoryTicker.enabled }}
        interval: {{ .Values.portal.pprof.memoryTicker.interval }}
        jumpSizeInBytes: {{ .Values.portal.pprof.memoryTicker.jumpSizeInBytes }}
        windowSize: {{ .Values.portal.pprof.memoryTicker.windowSize }}
        initialWait: {{ .Values.portal.pprof.memoryTicker.initialWait }}
      cpuTicker:
        enabled: {{ .Values.portal.pprof.cpuTicker.enabled }}
        interval: {{ .Values.portal.pprof.cpuTicker.interval }}
        jumpSizeInMCPU: {{ .Values.portal.pprof.cpuTicker.jumpSizeInMCPU }}
        windowSize: {{ .Values.portal.pprof.cpuTicker.windowSize }}
        initialWait: {{ .Values.portal.pprof.cpuTicker.initialWait }}    

    Kong:
      Enabled: {{ include "backend.kong.enabled" . }}
      Endpoint: {{ include "backend.kong.endpoint" . }}

    IntegrationAgent:
      Enabled: {{ .Values.global.integrations.agent.enabled }}
      Endpoint: {{ include "integrations-agent.url" . }}

    Instrumentation:
      MetricsTargets:
      {{- range .Values.portal.instrumentation.metricsTargets }}
        - Endpoint: {{ .endpoint }}
          {{- if .headers }}
          Headers:
            {{- range $key, $value := .headers }}
            {{ $key }}: {{ $value | quote }}
            {{- end }}
          {{- end }}
      {{- end }}
      MetricsPushInterval: {{ .Values.portal.instrumentation.metricsPushInterval }}
      {{- if .Values.portal.instrumentation.metricsExtraLabels }}
      MetricsExtraLabels:
        {{- range $key, $value := .Values.portal.instrumentation.metricsExtraLabels }}
        {{ $key }}: {{ $value | quote }}
        {{- end }}
      {{- end }}
      TracingTargets:
      {{- range .Values.portal.instrumentation.tracingTargets }}
        - Endpoint: {{ .endpoint }}
          {{- if .headers }}
          Headers:
            {{- range $key, $value := .headers }}
            {{ $key }}: {{ $value | quote }}
            {{- end }}
          {{- end }}
          {{- if .insecure }}
          Insecure: {{ .insecure }}
          {{- end }}
          {{- if .tlsSkipVerify }}
          TlsSkipVerify: {{ .tlsSkipVerify }}
          {{- end }}
      {{- end }}
      {{- if .Values.portal.instrumentation.batchSize }}
      BatchSize: {{ .Values.portal.instrumentation.batchSize }}
      {{- end }}
      {{- if .Values.portal.instrumentation.batchTimeout }}
      BatchTimeout: {{ .Values.portal.instrumentation.batchTimeout }}
      {{- end }}
      {{- if .Values.portal.instrumentation.exportTimeout }}
      ExportTimeout: {{ .Values.portal.instrumentation.exportTimeout }}
      {{- end }}
      {{- if .Values.portal.instrumentation.maxQueueSize }}
      MaxQueueSize: {{ .Values.portal.instrumentation.maxQueueSize }}
      {{- end }}
      {{- if .Values.portal.instrumentation.spanAttributes }}
      SpanAttributes:
        {{- range $key, $value := .Values.portal.instrumentation.spanAttributes }}
        {{ $key }}: {{ $value | quote }}
        {{- end }}
      {{- end }}

    RumSourcemaps:
      Enabled: {{ .Values.global.ingestor.enabled }}
      {{- if .Values.global.ingestor.enabled }}
      Endpoint: {{ include "ingestor.rumsourcemaps.http.url" . }}
      {{- end }}

    DispatchCenter:
      Enabled: {{ .Values.global.dispatchCenter.enabled }}
      Endpoint: http://{{ include "dispatch-center.fullname" . }}:8080
    CommHub:
      Enabled: {{ .Values.global.commHub.enabled }}
      Endpoint: http://{{ include "comm-hub.fullname" . }}:8080
    DBManager:
      Enabled: {{ .Values.global.backend.enabled }}
      Endpoint: {{ include "db-manager.http.url" . }}
    MonitorsService:
      Enabled: {{ and .Values.global.backend.enabled .Values.global.monitorsService.enabled }}
      Endpoint: http://{{ include "monitors-service.fullname" . }}:{{ .Values.monitorsService.httpPort }}
    {{- if .Values.portal.configuration.AgentService }}
    AgentService:
      Enabled: {{ .Values.portal.configuration.AgentService.Enabled | default (.Values.agentService.enabled | default false) }}
      Endpoint: {{ .Values.portal.configuration.AgentService.Endpoint | default (printf "http://%s:8080" (include "agent-service.fullname" .)) }}
    {{- end }}
    {{- $exportServiceEndpoint := printf "http://%s:3001" (printf "%s-export-service" .Release.Name | trunc 63 | trimSuffix "-") }}
    ExportService:
      Enabled: {{ dig "exportService" "enabled" false .Values.global }}
      Endpoint: {{ dig "configuration" "ExportService" "Endpoint" $exportServiceEndpoint .Values.portal | default $exportServiceEndpoint }}

kind: ConfigMap
metadata:
  labels:
    {{- include "groundcover.labels" . | nindent 4 }}
    {{- if .Values.portal.additionalLabels }}
{{ toYaml .Values.portal.additionalLabels | indent 4 }}
    {{- end }}
  annotations:
    groundcover_version: {{ default .Chart.AppVersion .Values.global.origin.tag }}
    {{- if .Values.portal.additionalAnnotations }}
{{ toYaml .Values.portal.additionalAnnotations | indent 4 }}
    {{- end }}
  name: {{ include "portal.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
{{ end -}}
