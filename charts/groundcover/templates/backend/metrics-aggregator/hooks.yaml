{{- $sensorValues := deepCopy .Values.metricsAggregator -}}
{{- $sensorValues = mergeOverwrite $sensorValues (default (dict) .Values.global.metricsAggregator) -}}
{{ if and .Values.global.backend.enabled .Values.global.metricsAggregator.enabled (index .Values "statefulset-modifier" "metrics-aggregator" "enabled") $sensorValues.statefulset }}
{{- $persistence := merge (dict "annotations" (default dict $sensorValues.persistence.annotations)) $sensorValues.persistence -}}
{{- $shouldPatchPvc := true -}}
{{- $shouldPatchAnnotations := true -}}
{{- $stsHasPvc := false -}}
{{- $stsExists := false -}}
{{- $shouldPatchSize := (index .Values "statefulset-modifier" "sizePatches") -}}
{{- $pvcSize := $persistence.size -}}
{{- $annotations := ($persistence.annotations | default dict) | toJson -}}
{{- $patches := (include "volume-expansion.patches" $persistence) | fromYaml -}}
{{- $sizePatches := (include "volume-expansion.size-patches" $persistence) | fromYaml -}}
{{- $annotationsPatches := (include "volume-expansion.annotations-patches" $persistence) | fromYaml -}}
{{- $sizePvcPatch := (get $sizePatches "pvc") | toJson -}}
{{- $sizeStsPatch := (get $sizePatches "sts") | toJson -}}
{{- $annotationsPvcPatch := (get $annotationsPatches "pvc") | toJson -}}
{{- $annotationsStsPatch := (get $annotationsPatches "sts") | toJson -}}
{{- $pvcPatch := (get $patches "pvc") | toJson -}}
{{- $stsPatch := (get $patches "sts") | toJson -}}
{{- $name := (printf "%s-metrics-aggregator" (include "statefulset-modifier.fullname" $)) -}}
{{- $stsName := (include "metrics-aggregator.fullname" .) -}}
{{- $pvcName := (printf "persistent-queue-data-%s-0" $stsName) -}}
{{ if $.Release.IsUpgrade }}
{{- $pvc := (lookup "v1" "PersistentVolumeClaim" $.Release.Namespace $pvcName | default dict) -}}
{{- $pvcCapacitySize := ($pvc | dig "status" "capacity" "storage" $pvcSize) -}}
{{- $sts := (lookup "apps/v1" "StatefulSet" $.Release.Namespace $stsName | default dict) -}}
{{- $stsPvcSize := ($sts | dig "spec" "volumeClaimTemplates" (list dict) | first | dig "spec" "resources" "requests" "storage" $pvcSize) -}}
{{- $stsPvcAnnotations := ($sts | dig "spec" "volumeClaimTemplates" (list dict) | first | dig "metadata" "annotations" dict) | toJson -}}
{{- $shouldPatchPvc = (not (eq $pvcSize $pvcCapacitySize)) -}}
{{- $shouldPatchAnnotations = (not (eq $stsPvcAnnotations $annotations)) -}}
{{- $stsHasPvc = (gt (len ($sts | dig "spec" "volumeClaimTemplates" (list))) 0) -}}
{{- $stsExists = (not (empty $sts)) -}}
{{- end -}}
{{- $isExpansion := (and $persistence.enabled $stsHasPvc (or (and $shouldPatchPvc $shouldPatchSize) $shouldPatchAnnotations)) -}}
{{- $isRecreate := (and $stsExists (ne $stsHasPvc $persistence.enabled)) -}}
{{/* Expansion keeps pods (orphan); recreate changes the pod's volume, so pods must be deleted and recreated */}}
{{- $cascade := ternary "foreground" "orphan" $isRecreate -}}
{{ if or $isExpansion $isRecreate }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $name }}
  labels:
  annotations:
  {{- include "statefulset-modifier.job.annotations" $ | nindent 4 }}
spec:
  backoffLimit: 0
  template:
    metadata:
      name: {{ $name }}
    spec:
      restartPolicy: Never
      imagePullSecrets: {{ include "imagePullSecrets" $ }}
      serviceAccountName: {{ include "statefulset-modifier.fullname" $ }}
      containers:
      - name: sts-delete
        imagePullPolicy: IfNotPresent
        image: {{ include "statefulset-modifier.job.image" $ }}
        command:
          - /bin/sh
          - -c
          - |
            set -e
            kubectl delete sts {{ $stsName | quote }} --ignore-not-found --cascade={{ $cascade }}
{{- if and $persistence.enabled $stsHasPvc }}
{{ if and $shouldPatchPvc $shouldPatchSize }}
      - name: pvc-patch
        imagePullPolicy: IfNotPresent
        image: {{ include "statefulset-modifier.job.image" $ }}
        command:
          - /bin/sh
          - -c
          - |
            set -e
            kubectl patch pvc {{ $pvcName | quote }} --type json --patch {{ $pvcPatch | quote }} || exit 0
{{ else if $shouldPatchAnnotations }}
      - name: pvc-patch
        imagePullPolicy: IfNotPresent
        image: {{ include "statefulset-modifier.job.image" $ }}
        command:
          - /bin/sh
          - -c
          - |
            set -e
            kubectl patch pvc {{ $pvcName | quote }} --type json --patch {{ $annotationsPvcPatch | quote }} || exit 0
{{- end -}}
{{- end -}}
{{- end -}}
{{- end -}}
