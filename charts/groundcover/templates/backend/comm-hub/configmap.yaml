{{- if .Values.global.commHub.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "comm-hub.configMapName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "groundcover.labels" . | nindent 4 }}
    app: comm-hub
    app.kubernetes.io/name: comm-hub
data:
  config.yaml: |
    backendId: {{ .Values.global.backend.name | default "" | quote }}
    tenantUuid: {{ .Values.global.backend.tenantUuid | default "" | quote }}

    temporal:
      address: {{ printf "%s:%v" (.Values.commHub.temporal.host | default (printf "%s-temporal-frontend" .Release.Name)) (.Values.commHub.temporal.port | default 7233) | quote }}
      namespace: {{ .Values.commHub.temporal.namespace | default "commhub" | quote }}

    healthProbe:
      enabled: {{ .Values.commHub.healthProbe.enabled | default true }}
      port: {{ .Values.commHub.healthProbe.port | default 8089 }}

    telemetry:
      enabled: {{ include "telemetry.enabled" . }}
      traces:
        enabled: true
        endpoint: {{ include "telemetry.traces.otlpUrl" . | quote }}
        writeTimeout: {{ .Values.commHub.tracing.writeTimeout | default "5s" }}
        flushInterval: {{ .Values.commHub.tracing.flushInterval | default "5s" }}
        batchSize: {{ .Values.commHub.tracing.batchSize | default 50 }}
      pprof:
        enabled: true
        cpuSamplingDuration: {{ .Values.commHub.pprof.cpuSamplingDuration | default "60s" }}
        httpUploader:
          enabled: {{ eq (.Values.commHub.pprof.uploaderType | default "pyroscope") "http" }}
          pushURL: {{ printf "%s/upload/pprof" (include "telemetry.metrics.base.url" .) | quote }}
        pyroscopeUploader:
          enabled: {{ eq (.Values.commHub.pprof.uploaderType | default "pyroscope") "pyroscope" }}
          pushURL: {{ include "telemetry.metrics.base.url" . | quote }}
        backoffTicker:
          interval: {{ .Values.commHub.pprof.backoffTicker.interval | default "10s" }}
          exponent: {{ .Values.commHub.pprof.backoffTicker.exponent | default 40 }}
        memoryTicker:
          enabled: {{ .Values.commHub.pprof.memoryTicker.enabled | default true }}
          interval: {{ .Values.commHub.pprof.memoryTicker.interval | default "60s" }}
          jumpSizeInBytes: {{ .Values.commHub.pprof.memoryTicker.jumpSizeInBytes | default 100000000 }}
          windowSize: {{ .Values.commHub.pprof.memoryTicker.windowSize | default "12h" }}
          initialWait: {{ .Values.commHub.pprof.memoryTicker.initialWait | default "10m" }}
        cpuTicker:
          enabled: {{ .Values.commHub.pprof.cpuTicker.enabled | default true }}
          interval: {{ .Values.commHub.pprof.cpuTicker.interval | default "60s" }}
          jumpSizeInMCPU: {{ .Values.commHub.pprof.cpuTicker.jumpSizeInMCPU | default 100 }}
          windowSize: {{ .Values.commHub.pprof.cpuTicker.windowSize | default "12h" }}
          initialWait: {{ .Values.commHub.pprof.cpuTicker.initialWait | default "10m" }}
      instrumentation:
        serviceName: "comm-hub"
        originCluster: {{ include "groundcover.clusterId" . | quote }}
        tracingTargets:
          - endpoint: {{ include "ingestor.otlptraces.cluster.http.url" . | quote }}

          {{- if and .Values.commHub.instrumentation .Values.commHub.instrumentation.additionalTraceTargets }}
          {{- toYaml .Values.commHub.instrumentation.additionalTraceTargets | nindent 10 }}
          {{- end }}

        metricsTargets:
          - endpoint: {{ include "metrics-ingester.promethues-exposition.http.url" . | quote }}

    dynconf:
      enabled: {{ .Values.global.fleetmanager.enabled }}
      url: {{ include "fleet-manager.url" . }}
      maximumInitialJitter: {{ .Values.fleetClientConfig.maximumInitialJitter }}
      requestInterval: {{ .Values.fleetClientConfig.requestInterval }}
      initialUpdateTimeout: {{ .Values.fleetClientConfig.initialUpdateTimeout }}
      insecureSkipVerify: {{ .Values.fleetClientConfig.tlsSkipVerify }}

    secretStore:
      url: {{ include "fleet-manager.base.url" . }}

    apiServer:
      port: 8080

    frontendDomain: {{ include "groundcover.frontendDomain" . | quote }}

    # agent-service base URL the Slack inbound bridge dispatches runs to (direct, not via the
    # router). Defaults to the in-namespace agent-service; the bridge appends the in-cluster-only
    # run path. Override with commHub.agentServiceUrl to point elsewhere.
    agentServiceUrl: {{ .Values.commHub | dig "agentServiceUrl" (printf "http://%s:8080" (include "agent-service.fullname" $)) | quote }}

    cursorCloud:
      baseURL: {{ .Values.commHub.cursorCloud.baseURL | default "https://api.cursor.com" | quote }}
      maxConnsPerHost: {{ .Values.commHub.cursorCloud.maxConnsPerHost | default 20 }}
      requestTimeout: {{ .Values.commHub.cursorCloud.requestTimeout | default "30s" }}
      maxRetries: {{ .Values.commHub.cursorCloud.maxRetries | default 5 }}

    claude:
      enabled: {{ .Values.commHub | dig "claude" "enabled" false }}
      baseURL: {{ .Values.commHub | dig "claude" "baseURL" "https://api.anthropic.com" | quote }}
      maxConnsPerHost: {{ .Values.commHub | dig "claude" "maxConnsPerHost" 20 }}
      requestTimeout: {{ .Values.commHub | dig "claude" "requestTimeout" "600s" | quote }}
      maxRetries: {{ .Values.commHub | dig "claude" "maxRetries" 5 }}

    providers:
      registrySyncInterval: {{ .Values.commHub.providers.registrySyncInterval | default "1s" }}

    oauthRefresh:
      disabled: {{ include "comm-hub.oauthRefreshDisabled" . }}
      taskQueue: {{ include "comm-hub.oauthRefreshTaskQueue" . | quote }}
      workflowId: {{ include "comm-hub.oauthRefreshWorkflowID" . | quote }}
      interval: {{ .Values.commHub | dig "oauthRefresh" "interval" "5m" | quote }}
      window: {{ .Values.commHub | dig "oauthRefresh" "window" "30m" | quote }}
      activityTimeout: {{ .Values.commHub | dig "oauthRefresh" "activityTimeout" "5m" | quote }}
      refreshTimeout: {{ .Values.commHub | dig "oauthRefresh" "refreshTimeout" "30s" | quote }}
      heartbeatTimeout: {{ .Values.commHub | dig "oauthRefresh" "heartbeatTimeout" "1m" | quote }}
      batchSize: {{ .Values.commHub | dig "oauthRefresh" "batchSize" 5 }}
      maxConcurrentWorkflowTaskPollers: {{ .Values.commHub | dig "oauthRefresh" "maxConcurrentWorkflowTaskPollers" 2 }}
      maxConcurrentActivityTaskPollers: {{ .Values.commHub | dig "oauthRefresh" "maxConcurrentActivityTaskPollers" 4 }}

    slack:
      enabled: {{ .Values.commHub.slack.enabled | default false }}
      baseURL: {{ .Values.commHub.slack.baseURL | default "https://slack.com" | quote }}
      maxConnsPerHost: {{ .Values.commHub.slack.maxConnsPerHost | default 10 }}
      requestTimeout: {{ .Values.commHub.slack.requestTimeout | default "30s" }}

    linear:
      enabled: {{ .Values.commHub.linear.enabled | default false }}
      authBaseURL: {{ .Values.commHub.linear.authBaseURL | default "https://linear.app" | quote }}
      apiBaseURL: {{ .Values.commHub.linear.apiBaseURL | default "https://api.linear.app" | quote }}
      maxConnsPerHost: {{ .Values.commHub.linear.maxConnsPerHost | default 20 }}
      requestTimeout: {{ .Values.commHub.linear.requestTimeout | default "30s" }}

    socketMode:
      # Quote the durations so a numeric override (e.g. 30) renders as a string and fails
      # loudly in config.Load rather than being decoded as nanoseconds (30 -> 30ns).
      reconcileInterval: {{ .Values.commHub | dig "socketMode" "reconcileInterval" "15s" | quote }}

    mcp:
      enabled: {{ .Values.commHub.mcp.enabled | default false }}
      allowInsecureURLs: {{ .Values.commHub.mcp.allowInsecureURLs | default false }}
      proxyTimeout: {{ .Values.commHub.mcp.proxyTimeout | default "30s" }}
      enableOAuth: {{ .Values.commHub.mcp.enableOAuth | default false }}
      # Quote the duration so a numeric override (e.g. 15) renders as a string and
      # fails loudly in config.Load rather than being decoded as nanoseconds (15 -> 15ns).
      oauthDiscoveryTimeout: {{ .Values.commHub.mcp.oauthDiscoveryTimeout | default "15s" | quote }}
      {{- with .Values.commHub.mcp.oauthClientName }}
      oauthClientName: {{ . | quote }}
      {{- end }}
      {{- with .Values.commHub.mcp.oauthSoftwareStatement }}
      oauthSoftwareStatement: {{ . | quote }}
      {{- end }}

    # Declarative connector catalog (MCP-backed presets). Always rendered so an
    # explicit empty list disables the catalog instead of omitting the section.
    connectorCatalog:
      entries:
        {{- toYaml (.Values.commHub | dig "connectorCatalog" "entries" (list)) | nindent 8 }}

    routeConfig:
      secretCacheTTL: {{ .Values.commHub.routeConfig.secretCacheTTL | default "5m" }}

    routerProxy:
      fleetManagerUrl: {{ include "fleet-manager.base.url" . }}

    postgresql:
      host: {{ tpl (toString .Values.commHub.postgresql.host) . | quote }}
      port: {{ tpl (toString .Values.commHub.postgresql.port) . | quote }}
      name: {{ .Values.commHub.postgresql.name | default "comm_hub" | quote }}
      user: {{ tpl (toString .Values.commHub.postgresql.user) . | quote }}
      pass: ""
      admindbname: {{ .Values.commHub.postgresql.adminDatabase | default (include "postgresql.database" .) | quote }}
      sslMode: {{ .Values.commHub.postgresql.sslMode | default "require" | quote }}
      timeout: {{ .Values.commHub.postgresql.timeout | default "30s" }}
      interval: {{ .Values.commHub.postgresql.interval | default "2s" }}
      enableTracing: {{ .Values.commHub.postgresql.enableTracing | default false }}
      migrationsPath: {{ .Values.commHub.postgresql.migrationsPath | default "/migrations" | quote }}
      skipMigrations: {{ .Values.commHub.postgresql.skipMigrations | default false }}

    encryption:
      key: {{ .Values.commHub.encryption.key | default "" | quote }}
{{- end }}
