{{ if and .Values.global.backend.enabled (or (index .Values "statefulset-modifier" "enabled") (index .Values "statefulset-modifier" "metrics-aggregator" "enabled")) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "statefulset-modifier.fullname" . }}
  labels:
  {{- include "groundcover.labels" . | nindent 4 }}
  annotations:
  {{- include "statefulset-modifier.rbac.annotations" $ | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - "persistentvolumeclaims"
    verbs:
      - "get"
      - "list"
      - "patch"
  - apiGroups:
      - "apps"
    resources:
      - "statefulsets"
    verbs:
      - "get"
      - "list"
      - "patch"
      - "delete"
{{- end -}}
